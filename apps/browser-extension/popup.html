<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Activity Analytics</title>
    <style>
      body {
        margin: 0;
        width: 320px;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #f5faf6 0%, #ebf3ed 100%);
        color: #163222;
      }

      main {
        padding: 18px;
        display: grid;
        gap: 14px;
      }

      .card {
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid #d5e3d8;
        border-radius: 20px;
        padding: 16px;
        box-shadow: 0 18px 40px rgba(19, 47, 31, 0.08);
      }

      h1 {
        margin: 0 0 6px;
        font-size: 18px;
      }

      p {
        margin: 0;
        font-size: 13px;
        color: #4f6a59;
      }

      dl {
        margin: 0;
        display: grid;
        gap: 10px;
      }

      dt {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #688271;
      }

      dd {
        margin: 4px 0 0;
        font-size: 14px;
        font-weight: 600;
      }

      button {
        height: 42px;
        border: none;
        border-radius: 14px;
        background: #1f6f4c;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <h1>Mini Activity Analytics</h1>
        <p>Browser tracking status and quick setup.</p>
      </div>
      <div class="card">
        <dl>
          <div>
            <dt>Tracking</dt>
            <dd id="trackingState">Loading...</dd>
          </div>
          <div>
            <dt>Backend</dt>
            <dd id="apiUrl">Loading...</dd>
          </div>
          <div>
            <dt>Device</dt>
            <dd id="deviceName">Loading...</dd>
          </div>
        </dl>
      </div>
      <button id="openSettings" type="button">Open settings</button>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
