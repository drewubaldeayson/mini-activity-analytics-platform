services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: activity_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/activity_analytics
    depends_on:
      - db
    ports:
      - "4000:4000"

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres-data:
